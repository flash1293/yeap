version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Named volumes
# ─────────────────────────────────────────────────────────────────────────────
volumes:
  yeap-data:
    name: yeap-data
  yeap-shared:
    name: yeap-shared
  caddy-data:
  caddy-config:
  postgres-data:
  mattermost-data:
  mattermost-config:

# ─────────────────────────────────────────────────────────────────────────────
# Network
# ─────────────────────────────────────────────────────────────────────────────
networks:
  yeap-net:
    driver: bridge
    name: yeap-net

# ─────────────────────────────────────────────────────────────────────────────
# Services
# ─────────────────────────────────────────────────────────────────────────────
services:

  # ── Caddy (TLS termination + reverse proxy) ──────────────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: yeap-caddy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      CADDY_DOMAIN: "${CADDY_DOMAIN:?CADDY_DOMAIN env var is required}"
      CADDY_ADMIN_PASSWORD_HASH: "${CADDY_ADMIN_PASSWORD_HASH:?CADDY_ADMIN_PASSWORD_HASH env var is required}"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - yeap-net
    restart: unless-stopped
    depends_on:
      - pwa

  # ── PostgreSQL (for Mattermost) ───────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: yeap-postgres
    environment:
      POSTGRES_DB: mattermost
      POSTGRES_USER: mattermost
      POSTGRES_PASSWORD: "${MM_DB_PASSWORD:-mattermost}"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - yeap-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mattermost"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Mattermost Team Edition ────────────────────────────────────────────────
  mattermost:
    image: mattermost/mattermost-team-edition:latest
    platform: linux/amd64
    container_name: yeap-mattermost
    ports:
      - "8065:8065"
    volumes:
      - mattermost-data:/mattermost/data
      - mattermost-config:/mattermost/config
    environment:
      MM_SQLSETTINGS_DRIVERNAME: postgres
      MM_SQLSETTINGS_DATASOURCE: "postgres://mattermost:${MM_DB_PASSWORD:-mattermost}@postgres:5432/mattermost?sslmode=disable"
      MM_SERVICESETTINGS_SITEURL: "${MATTERMOST_SITE_URL:-http://localhost:8065}"
      MM_SERVICESETTINGS_ENABLEBOTACCOUNTCREATION: "true"
      MM_SERVICESETTINGS_ENABLEUSERACCESSTOKENS: "true"
      MM_SERVICESETTINGS_ALLOWCORSFROM: "*"
      MM_EMAILSETTINGS_REQUIREEMAILVERIFICATION: "false"
      MM_EMAILSETTINGS_ENABLESMTPAUTH: "false"
      MM_EMAILSETTINGS_SMTPSERVER: ""
      MM_EMAILSETTINGS_SMTPPORT: "10025"
      MM_PLUGINSETTINGS_ENABLE: "false"
      MM_PLUGINSETTINGS_ENABLEUPLOADS: "false"
      MM_TEAMSETTINGS_ENABLETEAMCREATION: "true"
      MM_LOGSETTINGS_CONSOLELEVEL: "ERROR"
    networks:
      - yeap-net
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  # ── Orchestrator ──────────────────────────────────────────────────────────
  orchestrator:
    build:
      context: ..
      dockerfile: packages/orchestrator/Dockerfile
    container_name: yeap-orchestrator
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET env var is required}"
      DB_PATH: "/data/registry.db"
      MATTERMOST_URL: "http://mattermost:8065"
      MATTERMOST_SITE_URL: "${MATTERMOST_SITE_URL:-http://localhost:8065}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "${OTEL_EXPORTER_OTLP_ENDPOINT:-}"
      OTEL_EXPORTER_OTLP_HEADERS: "${OTEL_EXPORTER_OTLP_HEADERS:-}"
      OTEL_RESOURCE_ATTRIBUTES: "${OTEL_RESOURCE_ATTRIBUTES_ORCHESTRATOR:-service.name=yeap-orchestrator,deployment.environment=production}"
      BOT_MEMORY_MB: "${BOT_MEMORY_MB:-600}"
    volumes:
      - yeap-data:/data
      - yeap-shared:/shared
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - yeap-net
    restart: unless-stopped
    depends_on:
      mattermost:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/setup/status"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 90s

  # ── Reminder ──────────────────────────────────────────────────────────────
  reminder:
    build:
      context: ..
      dockerfile: packages/reminder/Dockerfile
    container_name: yeap-reminder
    ports:
      - "3001:3001"
    environment:
      PORT: "3001"
      ORCHESTRATOR_URL: "http://orchestrator:3000"
      DB_PATH: "/data/reminders.db"
      OTEL_EXPORTER_OTLP_ENDPOINT: "${OTEL_EXPORTER_OTLP_ENDPOINT:-}"
      OTEL_EXPORTER_OTLP_HEADERS: "${OTEL_EXPORTER_OTLP_HEADERS:-}"
      OTEL_RESOURCE_ATTRIBUTES: "${OTEL_RESOURCE_ATTRIBUTES_REMINDER:-service.name=yeap-reminder,deployment.environment=production}"
      MATTERMOST_URL: "http://mattermost:8065"
    volumes:
      - yeap-data:/data
      - yeap-shared:/shared
    networks:
      - yeap-net
    restart: unless-stopped
    depends_on:
      orchestrator:
        condition: service_healthy

  # ── Bot image (pre-built so the orchestrator can spawn containers from it) ──
  bot:
    build:
      context: ..
      dockerfile: packages/agent/Dockerfile
    image: yeap-bot:latest
    # This service only exists to produce the yeap-bot:latest image.
    # The orchestrator spawns real bot containers dynamically via the Docker socket.
    entrypoint: ["true"]
    restart: "no"

  # ── PWA ────────────────────────────────────────────────────────────────────
  pwa:
    build:
      context: ..
      dockerfile: packages/pwa/Dockerfile
    container_name: yeap-pwa
    ports:
      - "5173:80"
    networks:
      - yeap-net
    restart: unless-stopped
    depends_on:
      - orchestrator
      - reminder

  # nginx-bots removed: OpenCode replaced by pi-agent-core agent
