version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Named volumes
# ─────────────────────────────────────────────────────────────────────────────
volumes:
  yeap-data:
    name: yeap-data
  yeap-shared:
    name: yeap-shared
  caddy-data:
  caddy-config:
  freellmapi-data:

# ─────────────────────────────────────────────────────────────────────────────
# Network
# ─────────────────────────────────────────────────────────────────────────────
networks:
  yeap-net:
    driver: bridge
    name: yeap-net

# ─────────────────────────────────────────────────────────────────────────────
# Services
# ─────────────────────────────────────────────────────────────────────────────
services:

  # ── FreeLLMAPI (optional OpenAI-compatible free-tier aggregator) ──────────
  freellmapi:
    build:
      context: .
      dockerfile: freellmapi.Dockerfile
    image: yeap-freellmapi:latest
    container_name: yeap-freellmapi
    ports:
      - "3002:3001"   # Admin dashboard reachable on host port 3002
    environment:
      PORT: "3001"
      ENCRYPTION_KEY: "${FREELLMAPI_ENCRYPTION_KEY:?FREELLMAPI_ENCRYPTION_KEY env var is required}"
    volumes:
      - freellmapi-data:/app/data
    networks:
      - yeap-net
    restart: unless-stopped
    profiles:
      - freellmapi

  # ── Caddy (TLS termination + reverse proxy) ──────────────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: yeap-caddy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      CADDY_DOMAIN: "${CADDY_DOMAIN:?CADDY_DOMAIN env var is required}"
      CADDY_ADMIN_PASSWORD_HASH: "${CADDY_ADMIN_PASSWORD_HASH:?CADDY_ADMIN_PASSWORD_HASH env var is required}"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - yeap-net
    restart: unless-stopped
    depends_on:
      - pwa

  # ── Orchestrator ──────────────────────────────────────────────────────────
  orchestrator:
    build:
      context: ..
      dockerfile: packages/orchestrator/Dockerfile
    container_name: yeap-orchestrator
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET env var is required}"
      DB_PATH: "/data/registry.db"
      OTEL_EXPORTER_OTLP_ENDPOINT: "${OTEL_EXPORTER_OTLP_ENDPOINT:-}"
      OTEL_EXPORTER_OTLP_HEADERS: "${OTEL_EXPORTER_OTLP_HEADERS:-}"
      OTEL_RESOURCE_ATTRIBUTES: "${OTEL_RESOURCE_ATTRIBUTES_ORCHESTRATOR:-service.name=yeap-orchestrator,deployment.environment=production}"
      BOT_MEMORY_MB: "${BOT_MEMORY_MB:-600}"
    volumes:
      - yeap-data:/data
      - yeap-shared:/shared
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - yeap-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/setup/status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Reminder ──────────────────────────────────────────────────────────────
  reminder:
    build:
      context: ..
      dockerfile: packages/reminder/Dockerfile
    container_name: yeap-reminder
    ports:
      - "3001:3001"
    environment:
      PORT: "3001"
      ORCHESTRATOR_URL: "http://orchestrator:3000"
      DB_PATH: "/data/reminders.db"
      OTEL_EXPORTER_OTLP_ENDPOINT: "${OTEL_EXPORTER_OTLP_ENDPOINT:-}"
      OTEL_EXPORTER_OTLP_HEADERS: "${OTEL_EXPORTER_OTLP_HEADERS:-}"
      OTEL_RESOURCE_ATTRIBUTES: "${OTEL_RESOURCE_ATTRIBUTES_REMINDER:-service.name=yeap-reminder,deployment.environment=production}"
    volumes:
      - yeap-data:/data
      - yeap-shared:/shared
    networks:
      - yeap-net
    restart: unless-stopped
    depends_on:
      orchestrator:
        condition: service_healthy

  # ── Bot image (pre-built so the orchestrator can spawn containers from it) ──
  bot:
    build:
      context: ..
      dockerfile: infra/bot.Dockerfile
    image: yeap-bot:latest
    # This service only exists to produce the yeap-bot:latest image.
    # The orchestrator spawns real bot containers dynamically via the Docker socket.
    entrypoint: ["true"]
    restart: "no"

  # ── PWA ────────────────────────────────────────────────────────────────────
  pwa:
    build:
      context: ..
      dockerfile: packages/pwa/Dockerfile
    container_name: yeap-pwa
    ports:
      - "5173:80"
    networks:
      - yeap-net
    restart: unless-stopped
    depends_on:
      - orchestrator
      - reminder

  # ── nginx-bots (auth proxy in front of each bot's OpenCode port) ───────────
  nginx-bots:
    image: nginx:alpine
    container_name: yeap-nginx-bots
    # Pre-bind the full port range used for bot OpenCode UIs (up to 64 bots)
    ports:
      - "40960-41023:40960-41023"
    volumes:
      - ./nginx-bots.conf:/etc/nginx/nginx.conf:ro
      - yeap-data:/data:ro
    networks:
      - yeap-net
    restart: unless-stopped
    depends_on:
      orchestrator:
        condition: service_healthy
